services:
  postgres:
    image: postgres:latest
    container_name: imgGallery_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_image_gallery:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - img_gallery_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: imgGallery_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - img_gallery_network

  # Добавленный сервис для ASP.NET приложения
  imagegallery.api:
    build:
      context: .
      dockerfile: ImageGalleryApp/Dockerfile
    container_name: imgGallery_api
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - img_gallery_network

networks:
  img_gallery_network:
    driver: bridge

volumes:
  postgres_data_image_gallery: