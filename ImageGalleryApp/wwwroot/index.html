<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Левая панель - список файлов -->
        <div class="file-list-panel">
            <div class="panel-header">
                <h2>Список файлов</h2>
                <button class="upload-btn" id="uploadBtn">+ Добавить файл</button>
            </div>

            <div class="file-list" id="fileList">
                <div class="empty-state">Нет загруженных изображений</div>
            </div>
        </div>

        <!-- Правая панель - область просмотра -->
        <div class="viewer-panel">
            <div class="viewer-header">
                <h2>Область просмотра</h2>
                <div class="zoom-controls">
                    <button class="zoom-btn" id="zoomOutBtn" title="Уменьшить">-</button>
                    <span id="zoomLevel">100%</span>
                    <button class="zoom-btn" id="zoomInBtn" title="Увеличить">+</button>
                    <button class="zoom-btn" id="fitBtn" title="Вписать по размерам">⤢ Вписать</button>
                    <button class="zoom-btn" id="resetZoomBtn" title="Исходный размер">◉ 100%</button>
                </div>
            </div>

            <div class="image-viewer" id="imageViewer">
                <div class="no-selection">Выберите изображение из списка</div>
            </div>

            <div class="image-description" id="imageDescription">
                <div class="description-placeholder">Краткое описание</div>
            </div>
        </div>
    </div>

    <!-- Модальное окно загрузки -->
    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Загрузка изображения</h3>
                <button class="close-modal" id="closeModal">&times;</button>
            </div>
            <form id="uploadForm">
                <div class="form-group">
                    <label>Изображение *</label>
                    <input type="file" id="imageFile" accept="image/*" required>
                </div>
                <div class="form-group">
                    <label>Заголовок (необязательно)</label>
                    <input type="text" id="imageTitle" placeholder="Введите заголовок">
                </div>
                <div class="form-group">
                    <label>Краткое описание (необязательно)</label>
                    <textarea id="imageDescriptionInput" rows="3" placeholder="Введите описание"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-btn" id="cancelUpload">Отмена</button>
                    <button type="submit" class="submit-btn">Загрузить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно редактирования -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Редактирование</h3>
                <button class="close-modal" id="closeEditModal">&times;</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Заголовок</label>
                    <input type="text" id="editTitle" placeholder="Введите заголовок">
                </div>
                <div class="form-group">
                    <label>Краткое описание</label>
                    <textarea id="editDescription" rows="3" placeholder="Введите описание"></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="cancel-btn" id="cancelEdit">Отмена</button>
                    <button type="submit" class="submit-btn">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
